<!DOCTYPE html> <!-- Deklarasi HTML5 -->
<html lang="id"> <!-- Elemen utama HTML dengan bahasa Indonesia -->
<head>
    <meta charset="UTF-8"> <!-- Encoding karakter -->
    <title>Form Registrasi</title> <!-- Judul halaman -->
</head>
<body>

    <h2 align="center">FORM REGISTRASI</h2> <!-- Judul form -->

    <form action = "R:\collage\Semester 2\Pemrograman Web Dasar\Pertemuan 3\Biodata.html"> <!-- Awal form -->
        <table border="1" width="800" align="center"> <!-- Tabel sebagai layout -->

            <tr>
                <td>Username</td> <!-- Label username -->
                <td>:</td>
                <td><input type="text" name="username"></td> <!-- Input teks -->
            </tr>

            <tr>
                <td>Password</td>
                <td>:</td>
                <td><input type="password" name="password"></td> <!-- Input password -->
            </tr>

            <tr>
                <td>Nama Lengkap</td>
                <td>:</td>
                <td><input type="text" name="nama_lengkap"></td>
            </tr>

            <tr>
                <td>Tempat dan Tanggal Lahir</td>
                <td>:</td>
                <td>
                <input type="text" name="nama_lengkap">
                    <input type="date" name="tempat_lahir"> <!-- Tempat lahir -->
                </td>
            </tr>

            <tr>
                <td>Alamat</td>
                <td>:</td>
                <td><textarea name="alamat" rows="4" cols="40"></textarea></td> <!-- Input alamat -->
            </tr>

            <tr>
                <td>No. Telp/HP</td>
                <td>:</td>
                <td><input type="text" name="telp"></td>
            </tr>

            <tr>
                <td>Email</td>
                <td>:</td>
                <td>
                    <input type="text" name="email_user"> @ <!-- Username email -->
                    <select name="email_domain"> <!-- Domain email -->
                        <option>Gmail.com</option>
                        <option>Y.com</option>
                        <option>Outlook.com</option>
                    </select>
                </td
            </tr>

            <tr>
                <td>Jenis Kelamin</td>
                <td>:</td>
                <td>
                    <input type="radio" name="jk" value="pria"> Pria <!-- Radio pria -->
                    <input type="radio" name="jk" value="wanita"> Wanita <!-- Radio wanita -->
                    <input type="radio" name="jk" value="non binary" > Gak ada 
                </td>
            </tr>

            <tr>
                <td>Agama</td>
                <td>:</td>
                <td>
                    <select name="agama"> <!-- Pilih agama -->
                        <option>Pilih Agama Anda</option>
                        <option>Islam</option>
                        <option>Kristen</option>
                        <option>Hindu</option>
                        <option>Buddha</option>
                        <option>Konghucu</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Hoby</td>
                <td>:</td>
                <td>
                    <input type="checkbox" name="hoby" value="baca"> Baca Buku <!-- Checkbox -->
                    <input type="checkbox" name="hoby" value="olahraga"> Olah Raga
                    <input type="checkbox" name="hoby" value="game"> Main Game
                    <input type="checkbox" name="hoby" value="hiking"> Hiking
                </td>
            </tr>

            <tr>
                <td>Upload Photo anda</td>
                <td>:</td>
                <td><input type="file" name="foto"></td> <!-- Upload file -->
            </tr>

            <tr>
                <td></td>
                <td></td>
                <td>
                    <input type="submit" value="Submit"> <!-- Tombol kirim -->
                    <input type="reset" value="Clear"> <!-- Tombol reset -->
                </td>
            </tr>

        </table>
    </form> <!-- Akhir form -->

</body>
</html>
